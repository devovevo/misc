- name: Join Workers
  hosts: all
  become: yes
  tasks:
    - name: Generate join command on master
      when: inventory_hostname in groups['master']
      command: kubeadm token create --print-join-command --kubeconfig /etc/kubernetes/admin.conf
      register: master_join_output

    # Notice we completely deleted the "Store join command globally" task!

    - name: Run Kubeadm join on workers
      when: inventory_hostname in groups['workers']
      # We pull the stdout directly from the first master node in your inventory group
      command: "{{ hostvars[groups['master'][0]]['master_join_output']['stdout'] }}"
      register: join_result
      ignore_errors: yes 

    - name: Final Status
      when: inventory_hostname in groups['workers']
      debug:
        msg: "Worker {{ inventory_hostname }} join status: {{ join_result.rc | default('Already Joined') }}"
