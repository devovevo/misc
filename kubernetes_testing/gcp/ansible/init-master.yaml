- name: Initialize Master
  hosts: master
  become: true
  vars:
    # Explicitly define the user who should get kubectl access. 
    # Change this if you aren't logging in as evanvera.
    k8s_user: evan-vera 

  tasks:
    - name: Pre-init cleanup
      command: kubeadm reset -f
      ignore_errors: yes

    - name: Clear CNI contents (preserve directory for inotify)
      shell: rm -rf /etc/cni/net.d/*
      ignore_errors: yes

    - name: Initialize Kubeadm
      command: >
        kubeadm init 
        --pod-network-cidr=192.168.0.0/16 
        --apiserver-advertise-address={{ internal_ip }}
        --apiserver-cert-extra-sans={{ ansible_host }}
        --upload-certs
      register: kubeadm_init

    - name: Create .kube directory
      file:
        path: "/home/{{ k8s_user }}/.kube"
        state: directory
        owner: "{{ k8s_user }}"
        group: "{{ k8s_user }}"
        mode: '0755'

    - name: Copy admin.conf
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ k8s_user }}/.kube/config"
        remote_src: yes
        owner: "{{ k8s_user }}"
        group: "{{ k8s_user }}"
        mode: '0600'
    
    - name: Install Custom Resource Definitions (CRDs) Operator
      become: true
      become_user: "{{ k8s_user }}"
      command: kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v3.31.4/manifests/operator-crds.yaml
      register: crds_operator_result
      failed_when:
        - crds_operator_result.rc != 0
        - "'AlreadyExists' not in crds_operator_result.stderr"
      environment:
        KUBECONFIG: "/home/{{ k8s_user }}/.kube/config"

    - name: Install Tigera Operator (Modern Calico Standard)
      become: true
      become_user: "{{ k8s_user }}"
      command: kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v3.31.4/manifests/tigera-operator.yaml
      register: tigera_operator_result
      failed_when: 
        - tigera_operator_result.rc != 0
        - "'AlreadyExists' not in tigera_operator_result.stderr"
      environment:
        KUBECONFIG: "/home/{{ k8s_user }}/.kube/config"

    - name: Install Calico Custom Resources
      become: true
      become_user: "{{ k8s_user }}"
      command: kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v3.31.4/manifests/custom-resources.yaml
      register: custom_resources_result
      failed_when: 
        - custom_resources_result.rc != 0
        - "'AlreadyExists' not in custom_resources_result.stderr"
      environment:
        KUBECONFIG: "/home/{{ k8s_user }}/.kube/config"

    - name: Wait for the Control Plane to become Ready
      become: true
      become_user: "{{ k8s_user }}"
      command: kubectl wait --for=condition=Ready nodes --all --timeout=300s
      environment:
        KUBECONFIG: "/home/{{ k8s_user }}/.kube/config"
