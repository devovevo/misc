- name: Initialize Master
  hosts: master
  become: yes
  vars:
    # Explicitly define the user who should get kubectl access. 
    # Change this if you aren't logging in as evanvera.
    k8s_user: evan-vera 

  tasks:
    - name: Pre-init cleanup
      command: kubeadm reset -f
      ignore_errors: yes

    - name: Clear CNI
      command: rm -rf /etc/cni/net.d
      ignore_errors: yes

    - name: Initialize Kubeadm
      command: >
        kubeadm init 
        --pod-network-cidr=192.168.0.0/16 
        --apiserver-advertise-address={{ internal_ip }}
        --apiserver-cert-extra-sans={{ ansible_host }}
        --upload-certs
      register: kubeadm_init

    - name: Create .kube directory
      file:
        path: "/home/{{ k8s_user }}/.kube"
        state: directory
        owner: "{{ k8s_user }}"
        group: "{{ k8s_user }}"
        mode: '0755'

    - name: Copy admin.conf
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ k8s_user }}/.kube/config"
        remote_src: yes
        owner: "{{ k8s_user }}"
        group: "{{ k8s_user }}"
        mode: '0600'

    - name: Install Calico
      become: yes
      become_user: "{{ k8s_user }}"
      command: kubectl apply -f https://docs.tigera.io/calico/latest/manifests/calico.yaml
      retries: 10
      delay: 3
      register: result
      until: result.rc == 0
      environment:
        # Pass the KUBECONFIG explicitly just to be absolutely certain
        # the command module knows where to look.
        KUBECONFIG: "/home/{{ k8s_user }}/.kube/config"
